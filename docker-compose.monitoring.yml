version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: buildflow-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - buildflow
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: buildflow-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards/json:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - buildflow
    restart: unless-stopped
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: buildflow-pg-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://buildflow:buildflow@postgres:5432/buildflow?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - buildflow
    restart: unless-stopped
    depends_on:
      - postgres

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: buildflow-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379/0
    ports:
      - "9121:9121"
    networks:
      - buildflow
    restart: unless-stopped
    depends_on:
      - redis

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: buildflow-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - buildflow
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  buildflow:
    external: true
